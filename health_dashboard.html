<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsung Health Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f11; color: #e8e8ea; min-height: 100vh; padding: 2rem; }
  h1 { font-size: 1.4rem; font-weight: 600; color: #fff; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 1.75rem; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 2rem; }
  .card { background: #1a1a1f; border: 1px solid #2a2a30; border-radius: 10px; padding: 16px 18px; }
  .card-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .card-val { font-size: 26px; font-weight: 500; color: #fff; line-height: 1; }
  .card-sub { font-size: 11px; color: #555; margin-top: 5px; }
  .card-sub span { color: #888; }
  .filters { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1px solid #2a2a30; background: transparent; color: #666; cursor: pointer; transition: all .15s; }
  .filter-btn:hover { border-color: #444; color: #aaa; }
  .filter-btn.active { background: #fff; color: #0f0f11; border-color: #fff; font-weight: 500; }
  .section { margin-bottom: 2rem; }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .section-title { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .08em; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
  .dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .chart-wrap { position: relative; width: 100%; }
  .divider { height: 1px; background: #1e1e24; margin: 2rem 0; }
  #calWrap { display: grid; gap: 3px; }
  .cal-cell { border-radius: 2px; aspect-ratio: 1; min-height: 5px; cursor: default; position: relative; }
  .cal-cell:hover .tooltip { display: block; }
  .tooltip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #2a2a30; color: #ccc; font-size: 11px; padding: 5px 9px; border-radius: 5px; white-space: nowrap; pointer-events: none; z-index: 10; border: 1px solid #3a3a40; }
  .monthly-section { margin-bottom: 2rem; }
  @media (max-width: 700px) {
    body { padding: 1rem; }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<h1>Samsung Health Dashboard</h1>
<p class="subtitle">Steps & sleep goal tracking — Nov 2017 to Apr 2026</p>

<div class="stats" id="stats"></div>
<div class="filters" id="filters"></div>

<!-- Steps chart -->
<div class="section">
  <div class="section-head">
    <span class="section-title">Daily steps</span>
    <div class="legend">
      <span class="legend-item"><span class="dot" style="background:#22c486"></span>Over 10k</span>
      <span class="legend-item"><span class="dot" style="background:#e05555"></span>Under 10k</span>
    </div>
  </div>
  <div class="chart-wrap" style="height:200px"><canvas id="stepsChart"></canvas></div>
</div>

<div class="divider"></div>

<!-- Sleep chart -->
<div class="section">
  <div class="section-head">
    <span class="section-title">Sleep duration</span>
    <div class="legend">
      <span class="legend-item"><span class="dot" style="background:#4a9eff"></span>Over 8h</span>
      <span class="legend-item"><span class="dot" style="background:#f09820"></span>Under 8h</span>
    </div>
  </div>
  <div class="chart-wrap" style="height:180px"><canvas id="sleepChart"></canvas></div>
</div>

<div class="divider"></div>

<!-- Monthly steps trend -->
<div class="section">
  <div class="section-head">
    <span class="section-title">Monthly avg steps — all time</span>
  </div>
  <div class="chart-wrap" style="height:180px"><canvas id="monthlyChart"></canvas></div>
</div>

<div class="divider"></div>

<!-- Calendar -->
<div class="section">
  <div class="section-head">
    <span class="section-title" id="calTitle">Goal calendar — last 90 days</span>
  </div>
  <div id="calFilters" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"></div>
  <div class="section-head">
    <div class="legend">
      <span class="legend-item"><span class="dot" style="background:#22c486"></span>Both met</span>
      <span class="legend-item"><span class="dot" style="background:#4a9eff"></span>Steps only</span>
      <span class="legend-item"><span class="dot" style="background:#a060ff"></span>Sleep only</span>
      <span class="legend-item"><span class="dot" style="background:#e05555"></span>Neither met</span>
      <span class="legend-item"><span class="dot" style="background:#2a2a30"></span>No data</span>
    </div>
  </div>
  <div id="calWrap"></div>
</div>

const PERIODS=[{label:'Last 30 days',days:30},{label:'Last 90 days',days:90},{label:'Last 6 months',days:180},{label:'Last year',days:365},{label:'All time',days:9999}];
let activePeriod=1;

function getFiltered(days){
  const cutoff=new Date('2026-04-28');
  cutoff.setDate(cutoff.getDate()-days);
  return RAW.filter(d=>new Date(d.date)>=cutoff);
}

function renderStats(data){
  const ws=data.filter(d=>d.steps!=null), sl=data.filter(d=>d.sleep!=null);
  const sg=ws.filter(d=>d.steps>=10000).length, slg=sl.filter(d=>d.sleep>=8).length;
  const avs=ws.length?Math.round(ws.reduce((s,d)=>s+d.steps,0)/ws.length):0;
  const avl=sl.length?(sl.reduce((s,d)=>s+d.sleep,0)/sl.length).toFixed(1):'-';
  document.getElementById('stats').innerHTML=`
    <div class="card"><div class="card-label">Avg daily steps</div><div class="card-val">${avs.toLocaleString()}</div><div class="card-sub">goal: 10,000</div></div>
    <div class="card"><div class="card-label">Steps goal days</div><div class="card-val">${sg}<span style="font-size:16px;color:#444"> / ${ws.length}</span></div><div class="card-sub">${ws.length?Math.round(sg/ws.length*100):0}% of days</div></div>
    <div class="card"><div class="card-label">Avg sleep</div><div class="card-val">${avl}h</div><div class="card-sub">goal: 8 hours</div></div>
    <div class="card"><div class="card-label">Sleep goal nights</div><div class="card-val">${slg}<span style="font-size:16px;color:#444"> / ${sl.length}</span></div><div class="card-sub">${sl.length?Math.round(slg/sl.length*100):0}% of nights</div></div>
  `;
}

let sc=null,lc=null,mc=null;
const chartDefaults={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};

function renderCharts(data){
  const sd=data.filter(d=>d.steps!=null);
  const ld=data.filter(d=>d.sleep!=null);

  if(sc)sc.destroy();
  sc=new Chart(document.getElementById('stepsChart'),{
    type:'bar',data:{
      labels:sd.map(d=>d.date.slice(5)),
      datasets:[{data:sd.map(d=>d.steps),backgroundColor:sd.map(d=>d.steps>=10000?'#22c486':'#e05555'),borderWidth:0,borderRadius:2}]
    },options:{...chartDefaults,plugins:{...chartDefaults.plugins,tooltip:{callbacks:{label:c=>c.raw.toLocaleString()+' steps'}}},
      scales:{x:{ticks:{font:{size:10},maxTicksLimit:12,color:'#555'},grid:{display:false}},
              y:{ticks:{font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v,color:'#555'},grid:{color:'#1e1e24'}}}}
  });

  if(lc)lc.destroy();
  lc=new Chart(document.getElementById('sleepChart'),{
    type:'bar',data:{
      labels:ld.map(d=>d.date.slice(5)),
      datasets:[{data:ld.map(d=>d.sleep),backgroundColor:ld.map(d=>d.sleep>=8?'#4a9eff':'#f09820'),borderWidth:0,borderRadius:2}]
    },options:{...chartDefaults,plugins:{...chartDefaults.plugins,tooltip:{callbacks:{label:c=>c.raw.toFixed(1)+'h sleep'}}},
      scales:{x:{ticks:{font:{size:10},maxTicksLimit:12,color:'#555'},grid:{display:false}},
              y:{min:0,max:14,ticks:{font:{size:10},stepSize:2,callback:v=>v+'h',color:'#555'},grid:{color:'#1e1e24'}}}}
  });
}

function renderMonthly(){
  const byMonth={};
  RAW.forEach(d=>{
    if(d.steps==null)return;
    const key=d.date.slice(0,7);
    if(!byMonth[key])byMonth[key]={sum:0,n:0};
    byMonth[key].sum+=d.steps; byMonth[key].n++;
  });
  const labels=Object.keys(byMonth).sort();
  const avgs=labels.map(k=>Math.round(byMonth[k].sum/byMonth[k].n));

  if(mc)mc.destroy();
  mc=new Chart(document.getElementById('monthlyChart'),{
    type:'bar',data:{
      labels:labels.map(l=>l.slice(0,7)),
      datasets:[{data:avgs,backgroundColor:avgs.map(v=>v>=10000?'#22c486':'#4a6fa5'),borderWidth:0,borderRadius:1}]
    },options:{...chartDefaults,plugins:{...chartDefaults.plugins,tooltip:{callbacks:{label:c=>c.raw.toLocaleString()+' avg steps'}}},
      scales:{x:{ticks:{font:{size:9},maxTicksLimit:20,color:'#444'},grid:{display:false}},
              y:{ticks:{font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v,color:'#555'},grid:{color:'#1e1e24'}}}}
  });
}

const CAL_PERIODS=[{label:'30d',days:30},{label:'90d',days:90},{label:'6mo',days:180},{label:'1yr',days:365},{label:'All',days:9999}];
let activeCalPeriod=1;

function renderCalFilters(){
  document.getElementById('calFilters').innerHTML=CAL_PERIODS.map((p,i)=>
    `<button class="filter-btn${i===activeCalPeriod?' active':''}" onclick="setCalPeriod(${i})">${p.label}</button>`
  ).join('');
}

function setCalPeriod(i){
  activeCalPeriod=i;
  renderCalFilters();
  renderCalendar(CAL_PERIODS[i].days);
}

function renderCalendar(days){
  days = days || CAL_PERIODS[activeCalPeriod].days;
  const data = getFiltered(days);
  const labels = {30:'last 30 days',90:'last 90 days',180:'last 6 months',365:'last year',9999:'all time'};
  document.getElementById('calTitle').textContent = 'Goal calendar — ' + (labels[days] || 'custom');

  const displayData = data;
  const cols = data.length > 500 ? 52 : data.length > 180 ? 26 : data.length > 90 ? 18 : 13;
  const grid=document.getElementById('calWrap');
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  grid.innerHTML='';
  displayData.forEach(d=>{
    const stepsOk=d.steps!=null&&d.steps>=10000;
    const hasSleep=d.sleep!=null;
    const sleepOk=hasSleep&&d.sleep>=8;
    let color;
    if(stepsOk&&sleepOk)        color='#22c486';
    else if(stepsOk&&!sleepOk)  color='#4a9eff';
    else if(!stepsOk&&sleepOk)  color='#a060ff';
    else if(!stepsOk&&hasSleep) color='#e05555';
    else                         color='#2a2a30';
    const tip=`${d.date}: ${d.steps!=null?d.steps.toLocaleString()+' steps':'no steps'}${d.sleep?' · '+d.sleep.toFixed(1)+'h':''}`;
    const cell=document.createElement('div');
    cell.className='cal-cell';
    cell.style.background=color;
    const tt=document.createElement('div');
    tt.className='tooltip'; tt.textContent=tip;
    cell.appendChild(tt);
    grid.appendChild(cell);
  });
}

function renderFilters(){
  document.getElementById('filters').innerHTML=PERIODS.map((p,i)=>
    `<button class="filter-btn${i===activePeriod?' active':''}" onclick="setPeriod(${i})">${p.label}</button>`
  ).join('');
}

function setPeriod(i){
  activePeriod=i; renderFilters();
  const data=getFiltered(PERIODS[i].days);
  renderStats(data); renderCharts(data);
}

renderFilters();
setPeriod(activePeriod);
renderMonthly();
renderCalFilters();
renderCalendar();
</script>
